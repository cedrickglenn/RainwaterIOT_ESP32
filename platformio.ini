; PlatformIO Project Configuration File
; RainwaterIOT — ESP32 Bridge Firmware

[env:esp32dev]
platform    = espressif32
board       = esp32dev
framework   = arduino
monitor_speed = 115200
upload_protocol = espota
upload_port     = 192.168.254.139
upload_flags    = --timeout=30
build_flags     = -DCORE_DEBUG_LEVEL=4
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    knolleary/PubSubClient@^2.8.0
    mathieucarbou/ESPAsyncWebServer@^3.3.0
    mathieucarbou/WebSerialLite@^6.2.0

; ── WiFi Test mode ───────────────────────────────────────────────────────────
; Uncomment to run the WiFi+Serial test sketch instead of main firmware.
; Comment out again when done testing.
;build_src_filter = -<*> +<../test/wifi_test.cpp>

; ── USB upload env (use this to flash via USB cable) ─────────────────────────
[env:esp32dev_usb]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    knolleary/PubSubClient@^2.8.0
    mathieucarbou/ESPAsyncWebServer@^3.3.0
    mathieucarbou/WebSerialLite@^6.2.0
